apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: transaction-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.17
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: root
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: 0.0.0.0:8200
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          readinessProbe:
            exec:
              command: ["vault", "status", "-address=http://127.0.0.1:8200"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
