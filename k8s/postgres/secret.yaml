apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: transaction-aggregator
type: Opaque
# Values are base64-encoded. For production, manage these with Vault or a
# secrets operator (e.g. External Secrets Operator) — never commit real credentials.
# To encode: echo -n 'value' | base64
# Defaults below are for local Kind development only.
stringData:
  username: postgres
  password: postgres
