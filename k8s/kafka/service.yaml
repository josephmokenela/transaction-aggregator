---
# Internal service — used by the app inside the cluster on port 9093
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: transaction-aggregator
spec:
  selector:
    app: kafka
  ports:
    - name: internal
      port: 9093
      targetPort: 9093
  type: ClusterIP

---
# External service — exposes port 9092 to the host machine via NodePort 30920
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: transaction-aggregator
spec:
  selector:
    app: kafka
  ports:
    - name: external
      port: 9092
      targetPort: 9092
      nodePort: 30920
  type: NodePort
