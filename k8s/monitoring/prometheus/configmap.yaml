apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: transaction-aggregator
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: transaction-aggregator
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: [ 'transaction-aggregator:8080' ]
