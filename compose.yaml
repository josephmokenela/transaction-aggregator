services:

  vault:
    image: hashicorp/vault:1.17
    container_name: transaction-aggregator-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  vault-init:
    image: hashicorp/vault:1.17
    container_name: transaction-aggregator-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-placeholder}
      PLAID_SECRET: ${PLAID_SECRET:-placeholder}
    entrypoint: sh -c
    command:
      - |
        vault kv put secret/transaction-aggregator \
          vault.db.password=postgres \
          vault.plaid.client-id=$$PLAID_CLIENT_ID \
          vault.plaid.secret=$$PLAID_SECRET \
          vault.jwt.secret=dev-only-secret-key-change-in-production!! \
          vault.jwt.admin-secret=dev-only-admin-secret &&
        echo 'Vault secrets seeded.'
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: transaction-aggregator-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: transaction-aggregator-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT → external (host machine), INTERNAL → app container, CONTROLLER → KRaft
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:9093,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: transaction-aggregator-db
    environment:
      POSTGRES_DB: transaction_aggregator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transaction_aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  transaction-aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    image: transaction-aggregator:latest
    container_name: transaction-aggregator
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      zipkin:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transaction_aggregator
      DB_USERNAME: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      APP_KAFKA_ENABLED: "true"
      APP_PLAID_ENABLED: ${APP_PLAID_ENABLED:-false}
      ZIPKIN_HOST: zipkin
      # DB_PASSWORD and Plaid credentials are sourced from Vault at startup
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:3
    container_name: transaction-aggregator-zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: transaction-aggregator-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - transaction-aggregator
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: transaction-aggregator-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DATABASE_WAL: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  vault_data:
