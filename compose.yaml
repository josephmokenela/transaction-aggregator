services:

  postgres:
    image: postgres:17-alpine
    container_name: transaction-aggregator-db
    environment:
      POSTGRES_DB: transaction_aggregator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transaction_aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  transaction-aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    image: transaction-aggregator:latest
    container_name: transaction-aggregator
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transaction_aggregator
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    restart: unless-stopped

volumes:
  postgres_data:
