spring:
  application:
    name: transaction-aggregator
  jackson:
    default-property-inclusion: non_null
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transaction_aggregator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  datasource:
    # Blocking JDBC DataSource used exclusively by Flyway at startup
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transaction_aggregator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  default-currency: GBP

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      # All metrics carry an 'application' label — useful for Grafana dashboards
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

---
spring:
  config:
    activate:
      on-profile: docker
  devtools:
    restart:
      enabled: false
  docker:
    compose:
      enabled: false
