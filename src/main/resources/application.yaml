server:
  shutdown: graceful  # Wait for in-flight requests to complete before stopping

spring:
  application:
    name: transaction-aggregator
  lifecycle:
    timeout-per-shutdown-phase: 30s  # Max time to wait for active requests to finish
  jackson:
    default-property-inclusion: non_null
  config:
    import: "optional:vault://"
  cloud:
    vault:
      enabled: false   # enabled explicitly in docker profile
      host: localhost
      port: 8200
      scheme: http
      authentication: TOKEN
      token: root
      kv:
        enabled: true
        default-context: transaction-aggregator
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:transaction_aggregator}
    username: ${DB_USERNAME:postgres}
    password: ${vault.db.password:${DB_PASSWORD:postgres}}
    pool:
      # Minimum connections kept alive — avoids cold-start latency on first request.
      initial-size: ${R2DBC_POOL_INITIAL_SIZE:5}
      # Maximum concurrent connections — tune against DB max_connections and replica count.
      max-size: ${R2DBC_POOL_MAX_SIZE:20}
      # Return idle connections to the pool after this period (reduces DB-side resource use).
      max-idle-time: ${R2DBC_POOL_MAX_IDLE_TIME:10m}
      # Fail fast if a connection cannot be acquired within this window.
      max-acquire-time: ${R2DBC_POOL_MAX_ACQUIRE_TIME:10s}
      # Recycle connections older than this to prevent silent TCP session rot.
      max-life-time: ${R2DBC_POOL_MAX_LIFE_TIME:30m}
      # Retry connection acquisition this many times before propagating the error.
      acquire-retry: ${R2DBC_POOL_ACQUIRE_RETRY:3}
  datasource:
    # Blocking JDBC DataSource used exclusively by Flyway at startup
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:transaction_aggregator}
    username: ${DB_USERNAME:postgres}
    password: ${vault.db.password:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false   # managed explicitly in PostgresConfig / H2DevConfig to control init ordering
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: transaction-aggregator
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "io.mokenela.transactionaggregator.*"

app:
  default-currency: GBP
  aggregation:
    # Maximum transactions loaded into memory when computing a customer summary.
    # Raise via MAX_TRANSACTIONS env var for high-volume accounts; logs a warning when hit.
    max-transactions-per-summary: ${MAX_TRANSACTIONS:10000}
    # Logs an info-level notice when a customer is approaching the limit.
    warn-threshold: ${WARN_THRESHOLD:5000}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}
    topic: transactions
  plaid:
    enabled: ${APP_PLAID_ENABLED:false}
    client-id: ${vault.plaid.client-id:${PLAID_CLIENT_ID:}}
    secret: ${vault.plaid.secret:${PLAID_SECRET:}}
    base-url: https://sandbox.plaid.com
    institution-id: ins_109508
  security:
    jwt:
      # Resolution order: Vault (docker profile) → JWT_SECRET env var → local dev fallback.
      # The fallback is intentionally weak and named to prevent accidental use outside local dev.
      # docker compose reads JWT_SECRET from .env (copied from .env.example).
      secret: ${vault.jwt.secret:${JWT_SECRET:local-dev-only-do-not-use-in-docker-or-prod}}
      expiry-hours: ${JWT_EXPIRY_HOURS:24}
      # Controls access to POST /api/v1/auth/admin-token.
      admin-secret: ${vault.jwt.admin-secret:${JWT_ADMIN_SECRET:local-dev-admin-do-not-use-in-docker-or-prod}}
    cors:
      # Comma-separated allowed origins. Override with CORS_ALLOWED_ORIGINS env var in production.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      # All metrics carry an 'application' label — useful for Grafana dashboards
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      # 100% in dev/docker; tune down (e.g. 0.1) for high-traffic production
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

---
spring:
  config:
    activate:
      on-profile: docker
  devtools:
    restart:
      enabled: false
  docker:
    compose:
      enabled: false
  cloud:
    vault:
      enabled: true
      host: vault
      port: 8200
