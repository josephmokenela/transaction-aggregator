spring:
  application:
    name: transaction-aggregator
  jackson:
    default-property-inclusion: non_null
  config:
    import: "optional:vault://"
  cloud:
    vault:
      enabled: false   # enabled explicitly in docker profile
      host: localhost
      port: 8200
      scheme: http
      authentication: TOKEN
      token: root
      kv:
        enabled: true
        default-context: transaction-aggregator
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:transaction_aggregator}
    username: ${DB_USERNAME:postgres}
    password: ${vault.db.password:${DB_PASSWORD:postgres}}
  datasource:
    # Blocking JDBC DataSource used exclusively by Flyway at startup
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:transaction_aggregator}
    username: ${DB_USERNAME:postgres}
    password: ${vault.db.password:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false   # managed explicitly in PostgresConfig / H2DevConfig to control init ordering
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: transaction-aggregator
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "io.mokenela.transactionaggregator.*"

app:
  default-currency: GBP
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}
    topic: transactions
  plaid:
    enabled: ${APP_PLAID_ENABLED:false}
    client-id: ${vault.plaid.client-id:${PLAID_CLIENT_ID:}}
    secret: ${vault.plaid.secret:${PLAID_SECRET:}}
    base-url: https://sandbox.plaid.com
    institution-id: ins_109508
  security:
    jwt:
      # Must be ≥32 characters (256 bits). Use Vault or JWT_SECRET env var in production.
      secret: ${vault.jwt.secret:${JWT_SECRET:dev-only-secret-key-change-in-production!!}}
      expiry-hours: ${JWT_EXPIRY_HOURS:24}
      # Change this in production — controls access to POST /api/v1/auth/admin-token
      admin-secret: ${vault.jwt.admin-secret:${JWT_ADMIN_SECRET:dev-only-admin-secret}}
    cors:
      # Comma-separated allowed origins. Override with CORS_ALLOWED_ORIGINS env var in production.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      # All metrics carry an 'application' label — useful for Grafana dashboards
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      # 100% in dev/docker; tune down (e.g. 0.1) for high-traffic production
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

---
spring:
  config:
    activate:
      on-profile: docker
  devtools:
    restart:
      enabled: false
  docker:
    compose:
      enabled: false
  cloud:
    vault:
      enabled: true
      host: vault
      port: 8200
